name: Docs (build check)

# Verifies the docs site renders (`mkdocs build --strict`) on every PR
# and push that touches the docs. It does NOT publish: deployment to
# GitHub Pages is owned by the modern-flow `pages.yml` (Settings → Pages
# → Source = "GitHub Actions"). Keeping deployment in one workflow avoids
# two mechanisms racing for the same Pages target.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'docs/requirements.txt'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'docs/requirements.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: docs-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build docs site (verify it renders)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: docs/requirements.txt

      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt

      - name: Build (strict)
        run: mkdocs build --strict --verbose
