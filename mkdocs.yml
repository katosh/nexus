site_name: nexus
site_description: A GitHub-Issues control surface for long-running AI coding agents on your own hardware.
site_url: https://katosh.github.io/nexus/
repo_url: https://github.com/katosh/nexus
repo_name: katosh/nexus
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.smartsymbols
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.keys

nav:
  - Home: index.md
  - Getting started:
      - Overview: getting-started/overview.md
      - Install: getting-started/install.md
      - First run: getting-started/first-run.md
      - Concepts: getting-started/concepts.md
  - Operating:
      - Overview: operating/overview.md
      - Dashboard: operating/dashboard.md
      - Spawning workers: operating/spawning-workers.md
      - Watcher: operating/watcher.md
      - Remote access quick-start: operating/remote-access-quickstart.md
      - Notifications: operating/notifications.md
      - Reports: operating/reports.md
      - Upgrading: operating/upgrading.md
      - Troubleshooting: operating/troubleshooting.md
  - Admin:
      - GitHub App: admin/github-app.md
      - Repos: admin/repos.md
      - Security: admin/security.md
      - Monitoring: admin/monitoring.md
      - <your-lab> addendum: admin/site-addendum.md
  - Reference:
      - Architecture: reference/architecture.md
      - Config: reference/config.md
      - ng CLI: reference/ng-cli.md
      - Watcher protocol: reference/watcher-protocol.md
      - Orchestrator liveness: reference/orchestrator-liveness.md
      - Worker states: reference/worker-states.md
      - Literature research: reference/literature.md
      - Skills: reference/skills.md
      - Files: reference/files.md
      - Dependency surface: reference/dependency-surface.md
  - Contributing:
      - Development: contributing/development.md
      - Tests: contributing/tests.md
      - Adding a skill: contributing/adding-a-skill.md
      - Release: contributing/release.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/katosh/nexus
  generator: false

strict: false
