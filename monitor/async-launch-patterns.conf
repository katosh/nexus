# monitor/async-launch-patterns.conf — patterns the PostToolUse
# Bash hook (`monitor/hooks/async-launch-detect.sh`) uses to detect
# launches of async external work in a worker's `Bash` tool calls.
#
# Each non-blank / non-comment line has FOUR pipe-separated fields:
#
#     kind|command_regex|id_regex|desc
#
#   kind          short identifier of the launch class. Free-form;
#                 the watcher's classifier only counts entries, so
#                 you can add new kinds without touching code.
#                 Examples: `slurm`, `slurm-srun-async`, `nohup`.
#
#   command_regex Extended regex matched (via bash `[[ =~ ]]`)
#                 against the FULL `tool_input.command` string the
#                 worker passed to Bash. Bash regex is POSIX ERE
#                 + `\b` word-boundary. Anchor with `^[[:space:]]*`
#                 or `\b` as appropriate.
#
#                 **No literal `|` in the regex** — the `|` is the
#                 field separator. Prefer `\b<word>\b` to ERE
#                 alternation when matching a command name; if you
#                 truly need alternation, add a new row per branch.
#
#   id_regex      Extended regex matched against the FULL
#                 `tool_response.stdout` string. The first capture
#                 group is taken as the launch id. Leave empty when
#                 the launcher's stdout doesn't expose an id (e.g.
#                 `nohup foo &`); the hook synthesizes a stable id
#                 from `sha1(command)[0:12]` so dismissal still
#                 works. Same `|`-prohibition as command_regex.
#
#   desc          Free-form human-readable label. Stored verbatim
#                 on the wait entry so the watcher's emit can say
#                 something useful when surfacing
#                 `idle-orphan-async`. Variable interpolation is
#                 NOT supported.
#
# Hot path: this file is read once per Bash PostToolUse hook fire.
# Keep the pattern count small (≤ 20 lines) and the regexes cheap
# (no backtracking horrors).
#
# Adding a pattern is data-only: edit this file, commit, redeploy.
# No code change needed in the hook.

# slurm sbatch — most common launch. Output line:
#   "Submitted batch job 52527284"
# Matches `sbatch`, `sbatch --array=1-10`, `sbatch --wrap='echo hi'`.
slurm|^[[:space:]]*sbatch\b|Submitted batch job ([0-9_]+)|sbatch

# slurm srun --no-block — fire-and-forget srun. The --no-block
# path also emits a batch-job line; same id_regex works.
slurm-srun-async|\bsrun\b[^&]*--no-block\b|Submitted job ([0-9_]+)|srun --no-block

# `nohup ... &` — backgrounded subprocess. No job id in stdout;
# synthetic id keyed on the command. Anchor on the trailing `&`
# (with optional whitespace) so `nohup echo foo` without backgrounding
# doesn't match — that's a foreground call.
nohup|\bnohup\b.*&[[:space:]]*$||nohup background
