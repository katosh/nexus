# monitor/bash-footgun-patterns.conf — patterns the PreToolUse Bash
# hook (`monitor/hooks/bash-footgun-guard.sh`) uses to deliver a
# JUST-IN-TIME reminder the moment a worker reaches for a known
# shell footgun. This is the data source that lets the worker floor
# stay slim: instead of front-loading every footgun into every spawn
# prompt (where it dilutes the task, is read once and forgotten, and
# is re-encountered later as a live incident), the relevant reminder
# is injected into context at the exact tool call that would trigger
# it.
#
# Mirrors the proven data-driven shape of async-launch-patterns.conf.
# Each non-blank / non-comment line has FOUR pipe-separated fields:
#
#     tag|severity|command_regex|message
#
#   tag           short stable identifier for this footgun. Used as
#                 the per-window dedup key so a given reminder is
#                 injected at most ONCE per worker session (a worker
#                 who has seen the pkill warning doesn't re-get it on
#                 every later pkill). Rows may SHARE a tag (e.g.
#                 pkill + pgrep) to fire the same reminder once for a
#                 family. Free-form, kebab-case.
#
#   severity      `warn`  — advisory. The hook injects `message` as
#                           PreToolUse `additionalContext` (exit 0):
#                           the tool still runs, the model reads the
#                           reminder in-context and self-corrects on
#                           the next call. Honors the floor's "warn,
#                           don't block" philosophy — bash parsing is
#                           brittle, a hard block false-positives.
#                 `block` — consequence is severe and session-wide.
#                           The hook exits 2, which BLOCKS the tool
#                           and shows `message` to the model, forcing
#                           a redirect. Use sparingly (see the
#                           context-poison guard, a separate hook).
#
#   command_regex Extended regex (POSIX ERE, bash `[[ =~ ]]`) matched
#                 against the FULL `.tool_input.command`. **No literal
#                 `|`** — it is the field separator. For alternation,
#                 add one row per branch sharing a tag (as the async
#                 conf header instructs). A footgun whose TRIGGER is a
#                 literal `|` (a shell pipe, e.g. `python … | tail`)
#                 cannot be expressed here and is matched in-code by
#                 the hook instead — see bash-footgun-guard.sh.
#
#   message       The reminder injected into context. Keep it to the
#                 actionable core (what breaks + what to do instead).
#                 No literal `|`. Variable interpolation NOT supported.
#
# Hot path: read once per Bash PreToolUse fire. Keep rows few (<= 20)
# and regexes cheap. Adding a footgun is DATA-ONLY: edit this file,
# commit, redeploy — no code change in the hook.

# pkill/pgrep -f self-kill (worker floor: the self-kill rule). The
# worker's full prompt rides in claude's argv, so a -f pattern that
# could appear in the prompt matches the worker's OWN process (exit
# 137) and reaps siblings sharing the launcher argv. Two rows, one tag.
pkill-self|warn|\bpkill[[:space:]]+-[a-zA-Z]*f|A `-f` process match rides claude's argv, which holds your FULL prompt — so it matches your OWN process (self-kill, exit 137) and can reap sibling workers sharing the launcher argv. Kill by recorded PID ($!) or a marker guaranteed absent from your prompt, never by a -f pattern.
pkill-self|warn|\bpgrep[[:space:]]+-[a-zA-Z]*f|A `-f` process match rides claude's argv, which holds your FULL prompt — pgrep -f matches your OWN process and any sibling worker sharing the launcher argv, so a follow-on kill self-terminates you. Match by recorded PID or a marker guaranteed absent from your prompt.

# jobs -p empty in a fresh Bash-tool shell.
jobs-p|warn|kill[[:space:]]+\$\(jobs[[:space:]]+-p|`jobs -p` is EMPTY in each fresh Bash-tool shell, so `kill $(jobs -p)` no-ops and leaks the background process. Save each `$!` to a file/var when you launch it, or spawn-and-kill within a single Bash call.

# git push: cwd-leak across &&-chains + no force-push / no --no-verify.
git-push|warn|git[[:space:]]+push|Pin each push to its clone: the Bash shell's cwd persists across calls and a `cd` earlier in an &&-chain leaks forward, so a second push in one batch can silently target the first push's remote. Use `git -C <clone> push …` for EACH push. No force-push, no --no-verify — fix the root cause.

# scancel by name/partition reaps sibling workers' identically-named
# jobs. Two rows, one tag.
scancel-name|warn|scancel\b[^0-9]*--name|scancel by EXPLICIT job-id, never --name/--partition: those filters match sibling nexus workers' identically-named jobs under the same $USER. Cancel the specific id: `scancel <jobid>`.
scancel-name|warn|scancel\b[^0-9]*--partition|scancel by EXPLICIT job-id, never --partition/--name: those filters match sibling nexus workers' jobs in this project. Cancel the specific id: `scancel <jobid>`.

# Foreground sleep is blocked in the sandbox.
foreground-sleep|warn|^[[:space:]]*sleep[[:space:]]+[0-9]|Foreground `sleep` is blocked in the sandbox. To wait on async work use a `Monitor` until-loop (`until [ -f <sentinel> ]; do sleep 30; done`) — `sleep` INSIDE the loop is fine.
